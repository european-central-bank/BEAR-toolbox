env:
  DOCMAKER_GITHUB_TOKEN: ${{ secrets.DOCMAKER_GITHUB_TOKEN }}

name: BEAR CI

on:
  push:
    branches: [ master, BEAR6 ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Test and package BEAR
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          products: Text_Analytics_Toolbox Statistics_and_Machine_Learning_Toolbox Optimization_Toolbox

      - name: Start a display server for jobs running on Linux
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run buildtool test
        uses: matlab-actions/run-build@v3
        with:
          tasks: check test

      - name: Package Toolbox
        uses: matlab-actions/run-build@v3
        with:
          tasks: archive
          build-options: -skip test
          generate-summary: true

      - name: Upload toolbox artifact
        uses: actions/upload-artifact@v7
        with:
          name: BEARXToolbox-mltbx
          path: releases/BEARtoolbox.mltbx
          if-no-files-found: error

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v5
        with:
          path: public/

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download toolbox artifact
        uses: actions/download-artifact@v5
        with:
          name: BEARXToolbox-mltbx
          path: releases

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: releases/BEARtoolbox.mltbx
          fail_on_unmatched_files: true
          generate_release_notes: true

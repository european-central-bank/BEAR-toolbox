env:
  DOCMAKER_GITHUB_TOKEN: ${{ secrets.DOCMAKER_GITHUB_TOKEN }}

# This is a basic workflow to help you get started with MATLAB Actions

name: Test and Package BEAR

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events for release branches
  push:
    branches: [ master, BEAR6-staging ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  # This workflow contains a single job called "build"
  build:
    name: Test and package BEAR
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v7
      
      # Sets up MATLAB on the GitHub Actions runner
      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          products: Text_Analytics_Toolbox
      
      - name: Start a display server for jobs running on Linux
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # Runs a set of commands using the runners shell
      - name: Run all tests
        uses: matlab-actions/run-build@v3
        with:
          tasks: archive
          build-options: -skip check -skip test
          generate-summary: true

      - name: Validate release tag
        id: release_tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.release_tag.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: releases/BEARtoolbox.mltbx
          fail_on_unmatched_files: true
